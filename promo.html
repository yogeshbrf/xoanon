<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XOANON Cinematic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,600;700&display=swap');

  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
  
  .video-container {
    position: relative;
    width: 100vh;
    max-width: 56.25vh; /* 9:16 aspect ratio */
    height: 100vh;
    background: radial-gradient(circle at center, #0a111a 0%, #020202 100%);
    overflow: hidden;
    box-shadow: 0 0 100px rgba(0,0,0,0.8);
  }

  /* Particles */
  #particles { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

  /* Typography */
  .text-wrapper {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .word {
    font-size: 13vh;
    font-weight: 700;
    letter-spacing: -0.05em;
    color: #fff;
    display: flex;
    gap: 0;
    position: relative;
  }

  .letter {
    opacity: 0;
    transform: scale(1.8) translateY(30px);
    filter: blur(25px);
    animation: letterReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    will-change: transform, opacity, filter, text-shadow;
  }

  /* Glitch/Glow effects */
  .glow-box {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(200, 169, 110, 0.15) 0%, transparent 50%);
    opacity: 0;
    mix-blend-mode: screen;
    animation: pulseGlow 4s ease-in-out 3s forwards;
    z-index: 2;
  }

  .streak {
    position: absolute;
    top: 50%; left: -100%;
    width: 200%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    transform: translateY(-50%) rotate(-25deg);
    opacity: 0;
    filter: blur(1px);
    animation: lightStreak 1.5s cubic-bezier(0.7, 0, 0.3, 1) 4s forwards;
    z-index: 5;
  }
  
  .streak2 {
    position: absolute;
    top: 60%; left: -100%;
    width: 200%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(100,160,255,0.6), transparent);
    transform: translateY(-50%) rotate(15deg);
    opacity: 0;
    filter: blur(2px);
    animation: lightStreak 2s cubic-bezier(0.7, 0, 0.3, 1) 4.5s forwards;
    z-index: 5;
  }

  .fade-out-overlay {
    position: absolute; inset: 0; background: #020202; opacity: 0; z-index: 100;
    pointer-events: none;
    animation: fadeOutFinal 2.5s ease-in-out 8.5s forwards;
  }

  @keyframes letterReveal {
    to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
  }

  @keyframes pulseGlow {
    0% { opacity: 0; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.3); }
    100% { opacity: 0.4; transform: scale(1); }
  }

  @keyframes lightStreak {
    0% { left: -100%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }

  @keyframes fadeOutFinal {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="video-container" id="vc">
  <canvas id="particles"></canvas>
  <div class="glow-box"></div>
  <div class="streak"></div>
  <div class="streak2"></div>
  <div class="text-wrapper">
    <div class="word" id="word">
      <!-- Letters injected by JS -->
    </div>
  </div>
  <div class="fade-out-overlay"></div>
</div>

<script>
  // Letters
  const text = "XOANON";
  const wordEl = document.getElementById('word');
  text.split('').forEach((char, i) => {
    const span = document.createElement('span');
    span.className = 'letter';
    span.innerText = char;
    // Stagger animation
    span.style.animationDelay = `${1 + (i * 0.18)}s`;
    
    // Add text shadow to letters after they land
    setTimeout(() => {
      span.style.textShadow = '0 0 30px rgba(200, 169, 110, 0.6), 0 0 80px rgba(100, 160, 255, 0.3)';
      span.style.transition = 'text-shadow 3s ease-out, color 3s ease-out, transform 8s linear';
      // Subtle constant scale after landing
      span.style.transform = 'scale(1.05)';
    }, 1000 + (i * 180) + 1200);

    wordEl.appendChild(span);
  });

  // Particles
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  
  function resize() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const pts = Array.from({length: 80}).map(() => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    s: Math.random() * 1.5 + 0.5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * -0.8 - 0.2,
    a: Math.random() * 0.8 + 0.2,
    f: Math.random() * 0.05
  }));

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.a += Math.sin(Date.now() * p.f) * 0.01;
      if (p.y < 0) p.y = canvas.height;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      ctx.fillStyle = `rgba(200, 220, 255, ${Math.max(0, Math.min(1, p.a))})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
      ctx.fill();
    });
    requestAnimationFrame(loop);
  }
  loop();
</script>

</body>
</html>
